<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClinPharm AI — Klinik Farmakologiya Trenajyori</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#050c18;--bg2:#07101f;--bg3:#0b1829;--card:#101c30;--card2:#152038;--card3:#1a2742;
  --border:rgba(255,255,255,0.065);--border2:rgba(255,255,255,0.12);
  --gold:#d4a843;--gold2:#f0c45a;--gold3:#b8902e;--glow:rgba(212,168,67,0.22);--gdim:rgba(212,168,67,0.1);
  --teal:#0ec9b0;--teal2:#22e8cc;--tdim:rgba(14,201,176,0.1);
  --red:#f04545;--rdim:rgba(240,69,69,0.12);
  --green:#28d98a;--grdim:rgba(40,217,138,0.12);
  --amber:#f5a623;--adim:rgba(245,166,35,0.12);
  --blue:#4a9eff;--bdim:rgba(74,158,255,0.12);
  --purple:#a855f7;--pdim:rgba(168,85,247,0.12);
  --text:#dce8f8;--text2:#8ea8c5;--text3:#4a6680;--text4:#2a3f58;
  --r4:8px;--r6:12px;--r8:16px;--r12:22px;--r16:28px;--r20:36px;
  --shadow:0 4px 24px rgba(0,0,0,0.55);--shadow-g:0 8px 48px rgba(212,168,67,0.18);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;font-size:14px}
h1,h2,h3,h4{font-family:'Libre Baskerville',serif}
code,pre,.mono{font-family:'JetBrains Mono',monospace}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:var(--card2);border-radius:9px}
.screen{display:none;min-height:100vh;flex-direction:column}
.screen.active{display:flex}

/* LANDING */
#landing{position:relative;overflow:hidden;align-items:center;justify-content:center;padding:70px 24px;text-align:center}
.orb{position:absolute;border-radius:50%;filter:blur(90px);animation:orbf 9s ease-in-out infinite;pointer-events:none}
.orb1{width:700px;height:700px;background:radial-gradient(circle,rgba(212,168,67,0.11),transparent 70%);top:-250px;right:-120px}
.orb2{width:550px;height:550px;background:radial-gradient(circle,rgba(14,201,176,0.08),transparent 70%);bottom:-100px;left:-130px;animation-delay:-3s}
.orb3{width:350px;height:350px;background:radial-gradient(circle,rgba(168,85,247,0.07),transparent 70%);top:55%;left:62%;animation-delay:-6s}
@keyframes orbf{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(28px,-22px) scale(1.04)}66%{transform:translate(-18px,28px) scale(0.96)}}
.lgrid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,0.016) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.016) 1px,transparent 1px);background-size:58px 58px;pointer-events:none}
.land-in{position:relative;z-index:2;max-width:840px;margin:0 auto}
.pill{display:inline-flex;align-items:center;gap:8px;border:1px solid rgba(212,168,67,0.3);background:rgba(212,168,67,0.07);backdrop-filter:blur(10px);padding:6px 22px;border-radius:99px;margin-bottom:48px;font-size:11px;font-weight:700;color:var(--gold2);letter-spacing:2px;text-transform:uppercase;animation:rise .7s ease both}
.pdot{width:7px;height:7px;background:var(--gold);border-radius:50%;box-shadow:0 0 10px var(--gold);animation:blink 2s ease infinite}
.land-h1{font-size:clamp(3.8rem,10vw,7.5rem);font-weight:700;line-height:.9;letter-spacing:-2.5px;margin-bottom:20px;animation:rise .85s .05s ease both}
.brand-grad{background:linear-gradient(135deg,#b8902e 0%,#d4a843 35%,#f0c45a 60%,#0ec9b0 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.land-sub{font-size:clamp(1rem,2vw,1.3rem);color:var(--text2);font-weight:300;letter-spacing:5px;text-transform:uppercase;margin-bottom:26px;animation:rise .9s .1s ease both}
.land-desc{font-size:1.07rem;color:var(--text2);line-height:1.85;max-width:590px;margin:0 auto 52px;animation:rise 1s .14s ease both}
.land-btns{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;animation:rise 1.1s .18s ease both}
.btn-p{background:linear-gradient(135deg,#b8902e,#d4a843,#f0c45a);color:#060c18;border:none;padding:15px 40px;border-radius:99px;font-family:'Plus Jakarta Sans',sans-serif;font-size:.95rem;font-weight:800;cursor:pointer;transition:all .25s;box-shadow:0 6px 28px rgba(212,168,67,0.45),inset 0 1px 0 rgba(255,255,255,0.25);letter-spacing:.3px}
.btn-p:hover{transform:translateY(-3px) scale(1.02);box-shadow:0 12px 42px rgba(212,168,67,0.62)}
.btn-sec{background:rgba(255,255,255,0.05);backdrop-filter:blur(10px);color:var(--text);border:1.5px solid rgba(255,255,255,0.11);padding:14px 28px;border-radius:99px;font-family:'Plus Jakarta Sans',sans-serif;font-size:.9rem;font-weight:600;cursor:pointer;transition:all .25s}
.btn-sec:hover{border-color:var(--gold);color:var(--gold2);background:rgba(212,168,67,0.07)}
.chips{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:22px;animation:rise 1.15s .22s ease both}
.chip{display:flex;align-items:center;gap:6px;padding:7px 14px;background:var(--card);border:1px solid var(--border2);border-radius:99px;font-size:.74rem;font-weight:600;color:var(--text2)}
.stats-row{margin-top:72px;display:flex;animation:rise 1.2s .26s ease both;border:1px solid rgba(212,168,67,0.18);border-radius:var(--r12);overflow:hidden;background:rgba(212,168,67,0.05);backdrop-filter:blur(10px)}
.sstat{flex:1;padding:24px 18px;text-align:center;border-right:1px solid rgba(212,168,67,0.13)}
.sstat:last-child{border-right:none}
.sstat-n{font-family:'Libre Baskerville',serif;font-size:2.3rem;font-weight:700;color:var(--gold);line-height:1;text-shadow:0 0 24px rgba(212,168,67,0.38)}
.sstat-l{font-size:.68rem;color:var(--text3);text-transform:uppercase;letter-spacing:1.2px;margin-top:6px}

/* AUTH */
#auth{align-items:center;justify-content:center;padding:48px 24px;background:radial-gradient(ellipse 700px 500px at 65% 25%,rgba(212,168,67,0.05),transparent 60%),var(--bg)}
.auth-card{width:100%;max-width:460px;background:var(--card);border:1px solid rgba(212,168,67,0.2);border-radius:var(--r16);padding:44px 40px;box-shadow:var(--shadow-g);animation:rise .5s ease}
.auth-brand{display:flex;align-items:center;gap:13px;margin-bottom:30px}
.auth-icon{width:44px;height:44px;background:linear-gradient(135deg,var(--gold3),var(--gold2));border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 4px 16px rgba(212,168,67,0.4)}
.auth-title{font-family:'Libre Baskerville',serif;font-size:1.1rem;font-weight:700}
.auth-tabs{display:flex;background:var(--bg3);border-radius:10px;padding:4px;gap:4px;margin-bottom:26px}
.atab{flex:1;padding:10px;border:none;background:transparent;color:var(--text3);border-radius:8px;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;font-size:.86rem;font-weight:700;transition:.17s;letter-spacing:.3px}
.atab.on{background:linear-gradient(135deg,var(--gold3),var(--gold2));color:#060c18}
.field{margin-bottom:16px}
.field label{display:block;font-size:.69rem;font-weight:800;color:var(--text3);margin-bottom:6px;text-transform:uppercase;letter-spacing:1px}
.field input,.field select,.field textarea{width:100%;padding:12px 15px;background:var(--bg3);border:1.5px solid var(--border);border-radius:var(--r6);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;font-size:.9rem;outline:none;transition:.2s;appearance:none}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--gold);background:rgba(212,168,67,0.04);box-shadow:0 0 0 3px rgba(212,168,67,0.07)}
.field textarea{resize:vertical;min-height:72px;line-height:1.6}
.field select option{background:var(--bg3)}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.btn-sub{width:100%;margin-top:8px;padding:14px;background:linear-gradient(135deg,var(--gold3),var(--gold2));color:#060c18;border:none;border-radius:10px;font-family:'Plus Jakarta Sans',sans-serif;font-size:.95rem;font-weight:800;cursor:pointer;transition:.25s;letter-spacing:.3px}
.btn-sub:hover{box-shadow:0 8px 32px rgba(212,168,67,0.5);transform:translateY(-2px)}
.auth-link{text-align:center;margin-top:14px;font-size:.78rem;color:var(--text3)}
.auth-link span{color:var(--gold2);cursor:pointer;font-weight:700}

/* DASHBOARD */
.dash{display:flex;min-height:100vh}
.sidebar{width:256px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:22px 14px;position:sticky;top:0;height:100vh;overflow-y:auto;z-index:10}
.sb-logo{display:flex;align-items:center;gap:11px;padding:4px 10px;margin-bottom:30px}
.sb-logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--gold3),var(--gold2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;box-shadow:0 4px 12px rgba(212,168,67,0.3)}
.sb-logo-name{font-family:'Libre Baskerville',serif;font-weight:700;font-size:.98rem;line-height:1.1}
.sb-logo-tag{font-size:.62rem;color:var(--text3);letter-spacing:.4px}
.sb-group{margin-bottom:22px}
.sb-group-lbl{font-size:.61rem;font-weight:800;color:var(--text4);text-transform:uppercase;letter-spacing:1.8px;padding:0 12px;margin-bottom:6px}
.nav-item{display:flex;align-items:center;gap:10px;width:100%;padding:10px 12px;border-radius:10px;background:transparent;border:none;color:var(--text3);font-family:'Plus Jakarta Sans',sans-serif;font-size:.86rem;font-weight:500;cursor:pointer;transition:all .16s;text-align:left;position:relative}
.nav-item:hover{background:rgba(255,255,255,0.04);color:var(--text)}
.nav-item.on{background:rgba(212,168,67,0.09);color:var(--gold2);border:1px solid rgba(212,168,67,0.2)}
.nav-item.on::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:54%;background:linear-gradient(to bottom,var(--gold3),var(--gold2));border-radius:0 3px 3px 0}
.nav-icon{font-size:.96rem;width:20px;text-align:center;flex-shrink:0}
.nav-badge{margin-left:auto;background:var(--rdim);color:var(--red);padding:2px 7px;border-radius:99px;font-size:.64rem;font-weight:800;border:1px solid rgba(240,69,69,0.25)}
.sb-prog{margin:14px 8px;padding:13px;background:var(--bg3);border-radius:var(--r6);border:1px solid var(--border)}
.sb-prog-title{font-size:.69rem;font-weight:700;color:var(--text2);margin-bottom:8px}
.sb-prog-bar{background:rgba(255,255,255,0.05);border-radius:99px;height:5px;overflow:hidden}
.sb-prog-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--gold3),var(--gold2));transition:width 1s ease}
.sb-prog-info{display:flex;justify-content:space-between;font-size:.65rem;color:var(--text3);margin-top:5px}
.sb-user{margin-top:auto;padding:11px 10px;background:var(--bg3);border-radius:11px;border:1px solid var(--border);display:flex;align-items:center;gap:10px}
.u-av{width:33px;height:33px;flex-shrink:0;background:linear-gradient(135deg,var(--gold3),var(--gold2));border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Libre Baskerville',serif;font-weight:700;font-size:.8rem;color:#060c18}
.u-nm{font-size:.82rem;font-weight:700}
.u-role{font-size:.64rem;color:var(--text3)}
.logout-btn{margin-left:auto;background:none;border:none;color:var(--text3);cursor:pointer;font-size:.95rem;padding:5px;transition:.2s;border-radius:6px}
.logout-btn:hover{color:var(--red);background:var(--rdim)}

/* MAIN */
.main{flex:1;overflow-y:auto;min-width:0}
.pg{display:none}
.pg.on{display:block;animation:pgIn .28s ease}
@keyframes pgIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.pg-hd{padding:24px 28px;border-bottom:1px solid var(--border);margin-bottom:0}
.pg-hd h2{font-size:1.75rem;font-weight:700;margin-bottom:3px}
.pg-hd p{color:var(--text2);font-size:.88rem}
.pg-hd-row{display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:14px}

/* KIRISH */
.kirish-body{padding:22px 28px 40px}
.bolim-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-bottom:24px}
.bolim-card{background:var(--card);border:1.5px solid var(--border);border-radius:var(--r8);padding:20px 16px;cursor:pointer;transition:all .22s;position:relative;overflow:hidden}
.bolim-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(212,168,67,0.09),transparent 60%);opacity:0;transition:.22s}
.bolim-card:hover,.bolim-card.on{border-color:rgba(212,168,67,0.5);transform:translateY(-3px);box-shadow:0 8px 32px rgba(212,168,67,0.17)}
.bolim-card.on::before,.bolim-card:hover::before{opacity:1}
.bolim-emoji{font-size:1.85rem;margin-bottom:10px;position:relative;z-index:1}
.bolim-name{font-family:'Libre Baskerville',serif;font-weight:700;font-size:.88rem;margin-bottom:3px;position:relative;z-index:1}
.bolim-cnt{font-size:.69rem;color:var(--text3);position:relative;z-index:1}
.bolim-bar{height:2px;background:rgba(255,255,255,0.06);border-radius:99px;margin-top:11px;overflow:hidden;z-index:1;position:relative}
.bolim-bar-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--gold3),var(--gold2))}

.kp-panel{background:var(--card);border:1px solid var(--border);border-radius:var(--r12);overflow:hidden}
.kp-head{padding:15px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:linear-gradient(135deg,rgba(212,168,67,0.07),transparent)}
.kp-head-l{display:flex;align-items:center;gap:10px}
.kp-head h3{font-size:.93rem;font-weight:700}
.kp-count{font-size:.69rem;color:var(--text3);background:var(--bg3);padding:3px 10px;border-radius:99px;border:1px solid var(--border)}
.kp-parent{padding:12px 20px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);cursor:pointer;transition:.15s;user-select:none}
.kp-parent:hover{background:rgba(255,255,255,0.025)}
.kp-pdot{width:6px;height:6px;background:var(--gold);border-radius:50%;flex-shrink:0;box-shadow:0 0 6px rgba(212,168,67,0.5)}
.kp-plbl{font-size:.87rem;font-weight:600}
.kp-arrow{margin-left:auto;font-size:.79rem;color:var(--text3);transition:.2s}
.kp-parent.open .kp-arrow{transform:rotate(90deg);color:var(--gold)}
.kp-child{padding:10px 20px 10px 42px;border-bottom:1px solid rgba(255,255,255,0.03);display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:all .16s;font-size:.83rem;color:var(--text2)}
.kp-child:hover{background:rgba(255,255,255,0.02);color:var(--text);padding-left:46px}
.kp-child.on{background:rgba(14,201,176,0.08);color:var(--teal2);border-left:3px solid var(--teal)}
.diff-e{color:var(--green);background:var(--grdim);padding:2px 8px;border-radius:99px;font-size:.64rem;font-weight:700}
.diff-m{color:var(--amber);background:var(--adim);padding:2px 8px;border-radius:99px;font-size:.64rem;font-weight:700}
.diff-h{color:var(--red);background:var(--rdim);padding:2px 8px;border-radius:99px;font-size:.64rem;font-weight:700}

/* TIMER */
.stimer{display:flex;align-items:center;gap:6px;font-family:'JetBrains Mono',monospace;font-size:.77rem;color:var(--text3);background:var(--bg3);padding:5px 12px;border-radius:99px;border:1px solid var(--border)}
.tdot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:blink 1.5s ease infinite}

/* BEMOR OYNASI */
.bemor-layout{display:grid;grid-template-columns:295px 1fr;height:100vh;position:sticky;top:0}
.pt-side{background:var(--bg2);border-right:1px solid var(--border);overflow-y:auto;padding:18px 14px;height:100vh;position:sticky;top:0}
.pt-photo-wrap{position:relative;margin-bottom:14px}
.pt-photo{width:100%;height:185px;object-fit:cover;object-position:center top;border-radius:var(--r8);border:2px solid rgba(212,168,67,0.18)}
.pt-photo-ov{position:absolute;inset:0;border-radius:var(--r8);background:linear-gradient(to top,rgba(5,12,24,0.96) 0%,transparent 50%)}
.pt-photo-info{position:absolute;bottom:0;left:0;right:0;padding:14px 12px}
.pt-pname{font-family:'Libre Baskerville',serif;font-size:1.02rem;font-weight:700}
.pt-page{font-size:.75rem;color:var(--text2);margin-top:1px}
.pt-dx-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(14,201,176,0.14);border:1px solid rgba(14,201,176,0.28);border-radius:99px;padding:3px 10px;font-size:.65rem;font-weight:700;color:var(--teal2);margin-top:5px}

/* VITALS */
.vital-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:12px}
.vital-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r6);padding:9px 11px}
.vital-card.warn{border-color:rgba(245,166,35,0.32)}
.vital-card.danger{border-color:rgba(240,69,69,0.38)}
.vital-card.ok{border-color:rgba(40,217,138,0.25)}
.vname{font-size:.64rem;color:var(--text3);margin-bottom:2px;text-transform:uppercase;letter-spacing:.7px}
.vval{font-family:'Libre Baskerville',serif;font-size:1.1rem;font-weight:700}
.vital-card.warn .vval{color:var(--amber)}
.vital-card.danger .vval{color:var(--red)}
.vital-card.ok .vval{color:var(--green)}
.vunit{font-size:.66rem;color:var(--text3);font-family:'Plus Jakarta Sans',sans-serif;font-weight:400}

/* PT TABS */
.pt-tabs{display:flex;gap:4px;margin-bottom:11px;overflow-x:auto;padding-bottom:2px}
.pt-tab{padding:5px 11px;border:1px solid var(--border);border-radius:99px;background:transparent;color:var(--text3);font-size:.69rem;font-weight:700;cursor:pointer;transition:.15s;white-space:nowrap;font-family:'Plus Jakarta Sans',sans-serif}
.pt-tab.on{background:rgba(212,168,67,0.09);color:var(--gold2);border-color:rgba(212,168,67,0.28)}
.pt-panel{display:none}
.pt-panel.on{display:block;animation:pgIn .18s ease}
.pt-sec{font-size:.61rem;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:var(--gold);margin:12px 0 7px}
.pt-row{display:flex;justify-content:space-between;align-items:flex-start;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.04);font-size:.79rem;gap:6px}
.pt-rl{color:var(--text3);flex-shrink:0;max-width:46%}
.pt-rv{font-weight:600;text-align:right;line-height:1.35}
.v-w{color:var(--amber)}.v-d{color:var(--red)}.v-ok{color:var(--green)}.v-t{color:var(--teal2)}.v-p{color:var(--purple)}

/* LABS */
.labs-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.lab-card{background:var(--bg3);border-radius:var(--r4);padding:9px 11px;border:1px solid var(--border)}
.lab-card.abn{border-color:rgba(240,69,69,0.28)}
.lab-card.warn{border-color:rgba(245,166,35,0.28)}
.lab-card.ok{border-color:rgba(40,217,138,0.2)}
.lab-nm{font-size:.62rem;color:var(--text3);margin-bottom:3px;letter-spacing:.4px}
.lab-val{font-weight:700;font-size:.9rem}
.lab-val.abn{color:var(--red)}.lab-val.warn{color:var(--amber)}.lab-val.ok{color:var(--green)}
.lab-ref{font-size:.61rem;color:var(--text4);font-weight:400}

/* RIGHT PANEL */
.bemor-right{display:flex;flex-direction:column;height:100vh;overflow:hidden}
.bemor-topbar{padding:13px 24px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0;position:relative}
.bemor-topbar::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(212,168,67,0.28),transparent)}
.tb-back{padding:7px 14px;border-radius:var(--r4);background:var(--bg3);border:1px solid var(--border);color:var(--text2);font-family:'Plus Jakarta Sans',sans-serif;font-size:.78rem;font-weight:600;cursor:pointer;transition:.18s;white-space:nowrap}
.tb-back:hover{border-color:var(--gold);color:var(--gold2)}
.tb-dx{font-family:'Libre Baskerville',serif;font-size:.94rem;font-weight:700;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tb-score{display:flex;align-items:center;gap:7px;flex-shrink:0}

<script>

  role: null,
  currentBolim: 'pulmo',
  currentKasallik: 'Pnevmoniya, pastki bo\'lak, o\'rta og\'ir',
  timerStart: null,
  timerInt: null,
  completedCases: JSON.parse(localStorage.getItem('cp_cases') || '[]'),
  apiKey: null
};

// ============ NAVIGATION ============
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function showAuth() { showScreen('auth'); }

function demoLogin(role) {
  state.role = role;
  state.user = role === 'teacher' ? 'Malika K.' : 'Alisher H.';
  if (role === 'teacher') {
    showScreen('tdash');
  } else {
    showScreen('sdash');
    startTimer();
    document.getElementById('s-av').textContent = 'AH';
    document.getElementById('s-nm').textContent = 'Alisher H.';
    buildKP('pulmo');
    buildHeat();
    updateStats();
  }
}

function doLogin() {
  const role = document.getElementById('e-role').value;
  demoLogin(role);
}

function logout() {
  stopTimer();
  showScreen('landing');
  state.user = null;
}

function authTab(t) {
  document.getElementById('f-login').style.display = t === 'login' ? '' : 'none';
  document.getElementById('f-reg').style.display = t === 'reg' ? '' : 'none';
  document.getElementById('at-login').classList.toggle('on', t === 'login');
  document.getElementById('at-reg').classList.toggle('on', t === 'reg');
}

// STUDENT PAGES
function spg(id, btn) {
  document.querySelectorAll('#sdash .pg').forEach(p => p.classList.remove('on'));
  document.getElementById(id).classList.add('on');
  if (btn) {
    document.querySelectorAll('#sdash .nav-item').forEach(n => n.classList.remove('on'));
    btn.classList.add('on');
  }
  if (id === 's-natija') { buildHeat(); updateStats(); }
}

// TEACHER PAGES
function tpg(id, btn) {
  document.querySelectorAll('#tdash .pg').forEach(p => p.classList.remove('on'));
  document.getElementById(id).classList.add('on');
  if (btn) {
    document.querySelectorAll('#tdash .nav-item').forEach(n => n.classList.remove('on'));
    btn.classList.add('on');
  }
}

// ============ TIMER ============
function startTimer() {
  state.timerStart = Date.now();
  state.timerInt = setInterval(() => {
    const s = Math.floor((Date.now() - state.timerStart) / 1000);
    const mm = String(Math.floor(s/60)).padStart(2,'0');
    const ss = String(s%60).padStart(2,'0');
    const t = mm+':'+ss;
    const d1 = document.getElementById('timer-display');
    const d2 = document.getElementById('timer2');
    if (d1) d1.textContent = t;
    if (d2) d2.textContent = t;
  }, 1000);
}
function stopTimer() { if (state.timerInt) clearInterval(state.timerInt); }

// ============ BOLIM / KASALLIK ============
const BOLIM_DATA = {
  kardio: {
    emoji: '❤️', name: 'Kardiologiya',
    groups: [
      { name: 'Gipertenziya', kasalliklar: [
        { n: 'AGB I-II daraja, beqaror', d: 'm' },
        { n: 'Gipertonik kriz, asoratlanmagan', d: 'e' },
        { n: 'Gipertonik kriz, ensefalopati', d: 'h' },
        { n: 'AGB, homiladorlik', d: 'h' }
      ]},
      { name: 'Yurak yetishmovchiligi', kasalliklar: [
        { n: 'YY, EF 40%, II FK', d: 'm' },
        { n: 'YY, EF 25%, III FK', d: 'h' },
        { n: 'O\'tkir chap qorincha YY', d: 'h' }
      ]},
      { name: 'Koronar kasallik', kasalliklar: [
        { n: 'Beqaror steno-kardiya', d: 'm' },
        { n: 'O\'tkir MI, ST ko\'tarilishsiz', d: 'h' },
        { n: 'Surunkali IYuK, AP II FK', d: 'e' }
      ]}
    ]
  },
  pulmo: {
    emoji: '🫁', name: 'Pulmonologiya',
    groups: [
      { name: 'Pnevmoniya', kasalliklar: [
        { n: 'Pastki bo\'lak pnevmoniyasi, o\'rta og\'ir', d: 'm' },
        { n: 'Pnevmoniya, homilador', d: 'h' },
        { n: 'Pnevmoniya, GFR 50, og\'ir', d: 'h' },
        { n: 'Nosokomial pnevmoniya', d: 'h' }
      ]},
      { name: 'Bronxit', kasalliklar: [
        { n: 'O\'tkir bronxit', d: 'e' },
        { n: 'Surunkali bronxit, qo\'zg\'alish', d: 'm' }
      ]},
      { name: 'Astma', kasalliklar: [
        { n: 'Bronxial astma, kuchayish', d: 'm' },
        { n: 'Astma, og\'ir tutilish', d: 'h' }
      ]}
    ]
  },
  gastro: {

    groups: [
      { name: 'Yurak tarzimtoni va O\'MO', kasalliklar: [
        { n: 'O\'tkir gastrit, eroziv', d: 'm' },

function pickBolim(el, id) {
  document.querySelectorAll('.bolim-card').forEach(c => c.classList.remove('on'));
  el.classList.add('on');
  state.currentBolim = id;
  buildKP(id);
}

function buildKP(bolimId) {
  const b = BOLIM_DATA[bolimId];
  if (!b) return;
  let html = `<div class="kp-head"><div class="kp-head-l"><span>${b.emoji}</span><h3>${b.name}</h3></div><span class="kp-count">${b.groups.reduce((a,g) => a + g.kasalliklar.length, 0)} kasallik</span></div>`;
  b.groups.forEach(g => {
    html += `<div class="kp-parent" onclick="toggleGroup(this)"><span class="kp-pdot"></span><span class="kp-plbl">${g.name}</span><span class="kp-arrow">▶</span></div>`;
    html += `<div class="kp-kids" style="display:none">`;
    g.kasalliklar.forEach(k => {
      const diffEl = k.d === 'e' ? '<span class="diff-e">Oson</span>' : k.d === 'm' ? '<span class="diff-m">O\'rta</span>' : '<span class="diff-h">Qiyin</span>';
      html += `<div class="kp-child" onclick="pickKasallik('${k.n.replace(/'/g,"\\'")}',this)">${k.n} ${diffEl}</div>`;
    });
    html += `</div>`;
  });
  document.getElementById('kp-panel').innerHTML = html;
  // Auto open first group

// ============ AI INTEGRATION ============
async function callClaude(prompt) {
  const r = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1200,
      messages: [{ role: 'user', content: prompt }]
    })
  });
  const data = await r.json();
  if (data.content && data.content[0]) return data.content[0].text;
  throw new Error(data.error?.message || 'API xatosi');
}

function getDrugs() {
  return Array.from(document.querySelectorAll('.rp-ta'))
    .map(t => t.value.trim())

function buildPrompt(drugs, type) {
  const dx = document.getElementById('topbar-dx').textContent;
  const common = `
Bemor: 47 yosh, erkak, 78 kg, A(II) Rh+.
Tashxis: ${dx}
Hamroh kasalliklar: Nafas yetishmovchiligi I, Surunkali pielonefrit, Temir tanqisligi anemiya II, HOMILADORLIK 14 HAFTA.
Muhim laborator: Leykositlar 14.2, CRP 98 mg/L, Kreatinin 134, GFR 52 mL/min, Hb 89 g/L, Ferritin 8.
ALLERGIYA: Ampitsillinga allergik reaktsiya (TAQIQLANGAN).
Buyurilgan dorilar:
${drugs.map((d,i) => `${i+1}. ${d}`).join('\n')}

Javobingni FAQAT o'zbek tilida ber.`;

  if (type === 'full') return common + `
Har bir dori uchun:
1. Tanlash to'g'riligi (ok/warn/bad) — sabab
2. Doza to'g'riligi (ok/warn/bad) — GFR 52 ga mosligi
3. Samaradorlik (ok/warn/bad)
4. Xavfsizlik (ok/warn/bad) — FDA kategoriya, allergiya
5. Umumiy baho: 0-100 ball

Oxirida umumiy xulosa va ball ber (SCORE: XX/100 formatida).`;
  if (type === 'sam') return common + `
Farmakoterapiyaning samaradorligini baho: 
- Klinik belgilar qanchalik tezlashishi kutilmoqda?
- Harorat, SpO2, leykositlar qachon normalashadi?
- 6-kun muammosi sababi nima?
- Korreksiya tavsiyasi ber.`;
  if (type === 'hav') return common + `
Farmakoterapiyaning XAVFSIZLIGINI baho:
- GFR 52 da qaysi dorilar xavfli?
- Homiladorlik 14 hafta (II trimest.) — FDA kategoriyalari to'g'rimi?
- Ampitsillinga allergiya bor — kross-reaktivlik xavfi bormi?
- Dori-dori o'zaro ta'siri bormi?
- Nojo'ya ta'sirlar monitoring rejasi.`;
}

function parseAndFill(text, drugs, type) {
  // Extract score
  const scoreMatch = text.match(/SCORE:\s*(\d+)/i) || text.match(/(\d+)\/100/);
  if (scoreMatch) {
    const sc = scoreMatch[1] + '/100';
    document.getElementById('total-score').textContent = sc;
    document.getElementById('topbar-score-val').textContent = sc;
  }

  // Fill DV table cells
  if (type === 'full') {
    const rows = document.querySelectorAll('#dv-body tr');
    rows.forEach((row, i) => {
      const cells = row.querySelectorAll('.sc-cell');
      cells.forEach((cell, ci) => {
        const labels = ['Tanlash', 'Doza', 'Samara', 'Xavfsizlik'];
        const cl = ci < labels.length ? labels[ci] : '';
        cell.innerHTML = buildScoreCell(cl, text, i);
      });
    });

    // Fill HAR list
    const harList = document.getElementById('har-list');
    harList.innerHTML = drugs.map((d, i) => {
      const lines = d.split('\n');
      const drugName = lines[0].replace('Rp.:','').replace('Rp:','').trim() || `Dori ${i+1}`;
      const percent = 55 + Math.floor(Math.random() * 40);
      const color = percent >= 80 ? 'var(--green)' : percent >= 60 ? 'var(--amber)' : 'var(--red)';
      const tags = buildHarTags(text, drugName);
      return `<div class="har-card">
        <div class="har-card-top"><div class="har-card-title">${drugName}</div><span style="font-family:'JetBrains Mono',monospace;font-size:.75rem;color:var(--gold2)">${percent}%</span></div>
        <div class="har-code">${d}</div>
        <div class="har-analysis">${extractDrugAnalysis(text, i, drugName)}</div>
        <div class="har-progress"><div class="har-progress-fill" style="width:${percent}%;background:${color}"></div></div>
        <div class="har-meta">${tags}</div>
      </div>`;
    }).join('');

    // Fill UM table
    const umLabels = ['tanlash','doza','kombinatsiya','samaradorlik','xavfsizlik','homiladorlik','allergiya'];
    umLabels.forEach((lbl, i) => {
      const el = document.getElementById(`um-r${i+1}`);
      if (el) el.innerHTML = buildUMCell(text, lbl);
    });
    document.getElementById('um-ai-block').style.display = '';
    document.getElementById('um-empty').style.display = 'none';
    document.getElementById('um-ai-text').innerHTML = sanitize(text.substring(0, 800));

    // Save to history
    saveCase(text, scoreMatch ? scoreMatch[1] : '—');
  }
}

function buildScoreCell(label, text, drugIdx) {
  const lowerText = text.toLowerCase();
  const level = lowerText.includes('xato') || lowerText.includes('taqiq') || lowerText.includes('allergiya') ? 'bad' :
                lowerText.includes('ehtiyot') || lowerText.includes('warn') || lowerText.includes('gfr') ? 'warn' : 'ok';
  const cls = level === 'ok' ? 'sv-ok' : level === 'warn' ? 'sv-w' : 'sv-b';
  const icons = { ok: '✓ To\'g\'ri', warn: '⚠️ Ehtiyot', bad: '✗ Xato' };
  return `<div class="sc-row"><span class="sc-key">${label}</span><span class="sc-val ${cls}">${icons[level]}</span></div>`;
}

function buildUMCell(text, label) {
  const lowerText = text.toLowerCase();
  const isWarn = lowerText.includes(label) && (lowerText.includes('ehtiyot') || lowerText.includes('mosla'));
  const isBad = lowerText.includes('xato') || (label === 'allergiya' && lowerText.includes('taqiq'));
  if (isBad) return '<span class="sc-val sv-b">✗ Xato</span>';
  if (isWarn) return '<span class="sc-val sv-w">⚠️ Ehtiyot</span>';
  return '<span class="sc-val sv-ok">✓ To\'g\'ri</span>';
}

function buildHarTags(text, drugName) {
  const t = text.toLowerCase();
  let tags = '';
  if (t.includes('fda') && t.includes('b')) tags += '<span class="htag-ok">FDA-B ✓</span>';
  if (t.includes('gfr') || t.includes('buyrak')) tags += '<span class="htag-warn">GFR moslash ⚠️</span>';
  if (t.includes('allergiya') && t.includes('ampitsillin')) tags += '<span class="htag-warn">Kross-allergiya ⚠️</span>';
  if (t.includes('taqiq') || t.includes('kontraindik')) tags += '<span class="htag-bad">Kontraindikatsiya ✗</span>';
  if (!tags) tags = '<span class="htag-ok">Mos ✓</span>';
  return tags;
}

function extractDrugAnalysis(text, idx, drugName) {
  // Extract relevant portion of AI response
  const sentences = text.split(/[.!?]\s+/);
  const relevant = sentences.filter(s => s.length > 20).slice(idx * 2, idx * 2 + 3).join('. ');
  return relevant || 'Tahlil natijasi ko\'rsatildi. Batafsil ma\'lumot uchun umumiy tahlil tabini ko\'ring.';
}

function sanitize(html) {
  return html.replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
}

async function runAI() {
  const drugs = getDrugs();
  if (!drugs.length) { toast('⚠️ Avval dorilarni kiriting!'); return; }
  document.getElementById('ai-run-btn').disabled = true;
  showAIModal('🔬 To\'liq Farmakologik Tahlil', 'Barcha 5 mezon bo\'yicha baholash...');
  document.getElementById('ai-ltxt').textContent = 'Har bir dori tahlil qilinmoqda...';
  try {
    const text = await callClaude(buildPrompt(drugs, 'full'));
    document.getElementById('ai-loading').style.display = 'none';
    document.getElementById('ai-result').style.display = '';
    document.getElementById('ai-text').innerHTML = sanitize(text);
    document.getElementById('ai-scores').style.display = 'grid';
    const sc = text.match(/(\d+)\/100/);
    if (sc) {
      document.getElementById('ais-har').textContent = sc[1] + '%';
      document.getElementById('ais-sam').textContent = Math.max(0, parseInt(sc[1]) - 5) + '%';
      document.getElementById('ais-hav').textContent = Math.max(0, parseInt(sc[1]) - 8) + '%';
    }
    document.getElementById('ai-close-btn').style.display = '';
    parseAndFill(text, drugs, 'full');
    toast('✅ AI tahlil tugadi!');
  } catch(e) {
    document.getElementById('ai-loading').style.display = 'none';
    document.getElementById('ai-result').style.display = '';
    document.getElementById('ai-text').innerHTML = '<div style="color:var(--red)">❌ API xatosi: ' + e.message + '</div><div style="color:var(--text3);font-size:.8rem;margin-top:8px">API kalitini tekshiring. Sayt demo rejimida ishlamoqda.</div>';
    document.getElementById('ai-close-btn').style.display = '';
    toast('❌ API xatosi');
  } finally {
    document.getElementById('ai-run-btn').disabled = false;
  }
}

  for (let i = 0; i < 70; i++) {

// ============ STATS ============
function updateStats() {
  const done = state.completedCases.length;
  const avg = done > 0 ? Math.round(state.completedCases.reduce((a, c) => a + (c.score || 0), 0) / done) : 0;
  const best = done > 0 ? Math.max(...state.completedCases.map(c => c.score || 0)) : 0;
  const doneEl = document.getElementById('done-cnt');
  const avgEl = document.getElementById('avg-sc');
  const bestEl = document.getElementById('best-sc');
  if (doneEl) doneEl.textContent = done;
  if (avgEl) avgEl.textContent = done > 0 ? avg + '%' : '—';
  if (bestEl) bestEl.textContent = done > 0 ? best + '%' : '—';
  // Fill history table
  const tbody = document.getElementById('nat-tbody');
  if (tbody && state.completedCases.length) {
    tbody.innerHTML = state.completedCases.slice(-10).reverse().map(c => `
      <tr>
        <td>${c.name || 'Pnevmoniya'}</td>
        <td><span class="tag tag-t">Pulmonologiya</span></td>
        <td style="color:${c.score >= 75 ? 'var(--green)' : c.score >= 55 ? 'var(--amber)' : 'var(--red)'};font-weight:800">${c.score}%</td>
        <td>${c.time || '15:32'}</td>
        <td>${c.date || 'Bugun'}</td>
        <td><span class="badge ${c.score >= 75 ? 'badge-e' : c.score >= 55 ? 'badge-m' : 'badge-h'}">${c.score >= 75 ? 'A\'lo' : c.score >= 55 ? 'Yaxshi' : 'Qoniqarsiz'}</span></td>
      </tr>`).join('');
  }
}

function saveCase(text, score) {
  const sc = parseInt(score) || 60;
  state.completedCases.push({
    name: state.currentKasallik.substring(0, 30),
    score: sc,
    date: new Date().toLocaleDateString('uz-UZ'),
    time: document.getElementById('timer2')?.textContent || '—'
  });
  localStorage.setItem('cp_cases', JSON.stringify(state.completedCases));
  // Update heat
  const heat = JSON.parse(localStorage.getItem('cp_heat') || '[]');
  heat[69] = Math.min(4, (heat[69] || 0) + 1);
  localStorage.setItem('cp_heat', JSON.stringify(heat));
  updateStats();
}

// ============ CALC ============
function calcGFR() {
  const gfr = parseFloat(document.getElementById('calc-gfr').value);
  const drug = document.getElementById('calc-drug').value;
  const dose = document.getElementById('calc-dose').value;
  let result = '';
  if (gfr >= 60) result = `✅ Doza moslash kerak emas.\nStandart doza: ${dose}`;
  else if (gfr >= 30) result = `⚠️ GFR 30-59 — Doza 50-75% ga kamaytiring.\nTavsiya: ${dose} → Doza × 0.75\nIntervalni uzaytiring.`;
  else if (gfr >= 15) result = `⚠️ GFR 15-29 — Doza 25-50% ga kamaytiring.\nTavsiya: Doza × 0.5, intervalni 2x uzaytiring.\nMonitering zarur.`;
  else result = `❌ GFR < 15 — ${drug} taqiqlangan yoki dializ rejimi.\nNefrologga murojaat qiling.`;
  document.getElementById('calc-result').textContent = result;
}

function calcMgKg() {
  const w = parseFloat(document.getElementById('calc-weight').value);
  const sel = document.getElementById('calc-mgkg-drug').value;
  const mg = parseFloat(sel.match(/(\d+)\s*mg\/kg/)?.[1] || 7);
  const total = (w * mg).toFixed(0);
  document.getElementById('calc-result2').textContent = `Umumiy kun doza: ${total} mg\nVazn: ${w} kg × ${mg} mg/kg\n3 ga bo'lganda: ${(total/3).toFixed(0)} mg × 3 marta`;
}

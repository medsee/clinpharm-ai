  push: (k, v) => { const arr = DB.get(k) || []; arr.push({...v, id: Date.now()}); DB.set(k, arr); return arr[arr.length-1]; },
  update: (k, id, data) => { const arr = DB.get(k) || []; const i = arr.findIndex(x=>x.id===id); if(i>-1){arr[i]={...arr[i],...data};DB.set(k,arr);} return arr[i]; },

/* ===== EVALUATE ===== */
function evaluate(drugs, criteria, monitoringPlan) {
  const drugEvals = drugs.map(drug => {
    const cd = (criteria.correctDrug||'').toLowerCase();
    const sd = (drug.drugName||'').toLowerCase();
    const match = sd && cd && (sd.includes(cd.split('/')[0]) || cd.includes(sd.split('/')[0]));
    const drugScore = match ? criteria.drugSelectionWeight * 10 : 0;
    const doseMatch = drug.dose && criteria.correctDose && drug.dose.trim() === criteria.correctDose.trim();
    const doseScore = doseMatch ? criteria.doseCorrectWeight*10 : (drug.dose ? criteria.doseCorrectWeight*5 : 0);
    const combScore = criteria.interactionsWeight * 7;
    const effScore = criteria.durationWeight * 8;
    const safeScore = criteria.safetyWeight * 8;
    let fb = drugScore === 0 ? `"${drug.drugName}" — noto'g'ri dori tanlov. To'g'ri: ${criteria.correctDrug}. ` : `Dori tanlov to'g'ri. `;
    if (!doseMatch) fb += `Doza "${drug.dose}" — to'g'ri doza: ${criteria.correctDose}. `;
    if (!drug.duration) fb += `Davolash davomiyligi ko'rsatilmagan (to'g'ri: ${criteria.correctDuration}). `;
    return { drugName: drug.drugName, drugSelectionScore: drugScore, doseScore, combinationScore: combScore, effectivenessScore: effScore, safetyScore: safeScore, feedback: fb };
  });
  const total = drugEvals.reduce((s,d)=>s+d.drugSelectionScore+d.doseScore+d.combinationScore+d.effectivenessScore+d.safetyScore,0);
  const pct = Math.min(100, Math.round(total));
  const mistakes = [];
  const recs = [];
  if (pct < 50) { mistakes.push("Dori tanlashda jiddiy xatolar mavjud"); recs.push("Klinik farmakologiya asoslarini qayta o'rganish tavsiya etiladi"); recs.push("Kasallikning patofiziyologiyasini chuqurroq o'rganing"); }
  else if (pct < 70) { mistakes.push("Doza va davomiylik belgilashda xatolar"); recs.push("Dorilarning farmakokinetikas bo'yicha ma'lumotni yangilang"); }
  else if (pct < 85) { mistakes.push("Monitoring rejasi yetarli emas"); recs.push("Terapiya monitoringi bo'yicha bilimlarni mustahkamlang"); }
  if (!monitoringPlan) { mistakes.push("Monitoring rejasi ko'rsatilmagan"); recs.push("Terapiyaning samaradorligi va xavfsizligini baholash rejasini tuzing"); }
  const fb = pct>=85?"Ajoyib ish! Farmakoterapiya to'g'ri tanlangan.":pct>=70?"Yaxshi harakat. Ba'zi jihatlarda qo'shimcha o'rganish tavsiya etiladi.":pct>=50?"O'rtacha natija. Asosiy xatolarni tahlil qilib, mavzuni qayta o'rganing.":"Dori tanlash va dozalashda jiddiy xatolar mavjud. Iltimos, o'qituvchi bilan maslahatlashing.";
  return { totalScore: total, maxScore: 100, percentage: pct, drugEvaluations: drugEvals, overallFeedback: fb, mistakeAreas: mistakes, recommendations: recs };
}

/* ===== UI COMPONENTS ===== */
const Btn = ({children, onClick, variant='primary', size='md', className='', disabled=false, type='button'}) => {
  const base = 'font-semibold rounded-xl transition-all duration-200 flex items-center justify-center gap-2 cursor-pointer disabled:opacity-50 disabled:cursor-not-allowed';
  const sizes = {sm:'px-3 py-1.5 text-xs', md:'px-4 py-2.5 text-sm', lg:'px-6 py-3 text-base'};
  const variants = {
    primary:'bg-sky-500 hover:bg-sky-600 text-white shadow-md shadow-sky-200',
    secondary:'bg-white border border-slate-200 text-slate-700 hover:bg-slate-50',
    danger:'bg-red-500 hover:bg-red-600 text-white',
    ghost:'text-slate-600 hover:bg-slate-100'
  };
  return <button type={type} onClick={onClick} disabled={disabled} className={`${base} ${sizes[size]} ${variants[variant]} ${className}`}>{children}</button>;
};

const Card = ({children, className=''}) => <div className={`bg-white rounded-2xl border border-slate-100 shadow-sm ${className}`}>{children}</div>;
const Badge = ({label, color='blue'}) => {
  const colors = {blue:'bg-blue-100 text-blue-700', green:'bg-green-100 text-green-700', red:'bg-red-100 text-red-700', yellow:'bg-yellow-100 text-yellow-700', purple:'bg-purple-100 text-purple-700', gray:'bg-slate-100 text-slate-600'};
  return <span className={`px-2.5 py-0.5 rounded-full text-xs font-semibold ${colors[color]||colors.blue}`}>{label}</span>;
};
const Input = ({label, ...p}) => <div className="space-y-1"><label className="text-sm font-medium text-slate-700">{label}</label><input {...p} className="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-sky-300 bg-white" /></div>;
const Textarea = ({label, ...p}) => <div className="space-y-1"><label className="text-sm font-medium text-slate-700">{label}</label><textarea {...p} className="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-sky-300 bg-white resize-none" /></div>;
const Select = ({label, options, ...p}) => <div className="space-y-1"><label className="text-sm font-medium text-slate-700">{label}</label><select {...p} className="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-sky-300 bg-white">{options.map(o=><option key={o.value} value={o.value}>{o.label}</option>)}</select></div>;

const ScoreRing = ({pct}) => {
  const r = 45, circ = 2*Math.PI*r;
  const offset = circ - (pct/100)*circ;
  const color = pct>=80?'#22c55e':pct>=50?'#f59e0b':'#ef4444';
  return (
    <div className="flex flex-col items-center">
      <svg width="120" height="120" viewBox="0 0 120 120">
        <circle cx="60" cy="60" r={r} fill="none" stroke="#f1f5f9" strokeWidth="10"/>
        <circle cx="60" cy="60" r={r} fill="none" stroke={color} strokeWidth="10" strokeLinecap="round"
          strokeDasharray={circ} strokeDashoffset={offset} transform="rotate(-90 60 60)"/>
        <text x="60" y="60" textAnchor="middle" dy="0.4em" fontSize="22" fontWeight="bold" fill={color}>{pct}%</text>
      </svg>
    </div>
  );
};

/* -- CASES LIST -- */
function CasesList({onNavigate}) {
  const cases = DB.get('cases') || [];
  const [search, setSearch] = useState('');
  const [spec, setSpec] = useState('');
  const [diff, setDiff] = useState('');
  const specs = [...new Set(cases.map(c=>c.specialty))];
  const diffLabels = {easy:'Oson',medium:"O'rta",hard:'Qiyin'};
  const diffColors = {easy:'green',medium:'yellow',hard:'red'};
  const filtered = cases.filter(c=>
    (!search||c.title.toLowerCase().includes(search.toLowerCase())||c.specialty.toLowerCase().includes(search.toLowerCase())) &&
    (!spec||c.specialty===spec) && (!diff||c.difficulty===diff)
  );
  return (
    <div className="space-y-6">
      <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-3">
        <div><h1 className="text-2xl font-bold text-slate-900">Klinik keyslar</h1><p className="text-slate-500">Mavjud klinik vaziyatlar</p></div>
      </div>
      <div className="flex flex-col sm:flex-row gap-3">
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Qidirish..." className="flex-1 border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-sky-300" />
        <select value={spec} onChange={e=>setSpec(e.target.value)} className="border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-sky-300 bg-white">
          <option value="">Barcha mutaxassisliklar</option>
          {specs.map(s=><option key={s} value={s}>{s}</option>)}
        </select>
        <select value={diff} onChange={e=>setDiff(e.target.value)} className="border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-sky-300 bg-white">
          <option value="">Barcha qiyinliklar</option>
          <option value="easy">Oson</option>
          <option value="medium">O'rta</option>
          <option value="hard">Qiyin</option>
        </select>
      </div>
      {filtered.length===0 && <div className="text-center py-16 text-slate-400"><p className="text-4xl mb-3">📭</p><p>Keyslar topilmadi</p></div>}
      <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-4">
        {filtered.map(c=>(
          <Card key={c.id} className="p-5 hover:shadow-md transition-shadow cursor-pointer group" onClick={()=>onNavigate('case_'+c.id)}>
            <div className="flex items-start justify-between mb-3">
              <Badge label={c.specialty} color="blue"/>
              <Badge label={diffLabels[c.difficulty]} color={diffColors[c.difficulty]}/>
            </div>
            <h3 className="font-semibold text-slate-800 text-sm leading-snug mb-2 group-hover:text-sky-600 transition-colors">{c.title}</h3>
            <p className="text-xs text-slate-400 mb-4">📚 {c.topic}</p>
            <Btn size="sm" className="w-full">Yechishni boshlash →</Btn>
          </Card>
        ))}
      </div>
    </div>
  );
}

/* -- SOLVE CASE -- */
function SolveCase({caseId, onNavigate}) {
  const {user} = useAuth();
  const cases = DB.get('cases') || [];
  const c = cases.find(x=>x.id===Number(caseId));
  const [tab, setTab] = useState('passport');
  const [drugs, setDrugs] = useState([{drugName:'',dose:'',frequency:'',route:'',duration:'',rationale:''}]);
  const [monitoring, setMonitoring] = useState('');
  const [sideEffect, setSideEffect] = useState('');
  const [rationale, setRationale] = useState('');
  const [submitted, setSubmitted] = useState(false);
  const [result, setResult] = useState(null);

  if (!c) return <div className="text-center py-16"><p className="text-slate-400">Keys topilmadi</p><Btn onClick={()=>onNavigate('cases')} className="mt-4">Orqaga</Btn></div>;

  const p = c.patientInfo;
  const genderLabel = {male:'Erkak', female:'Ayol'};
  const severityLabel = {mild:'Yengil', moderate:"O'rta og'ir", severe:"Og'ir"};
  const organLabel = {normal:'Normal', mild_impairment:'Yengil buzilish', severe_impairment:"Og'ir buzilish"};
  const tabs = [{id:'passport',label:'Pasport'},{id:'complaints',label:'Shikoyatlari'},{id:'anamnesis',label:'Anamnez'},{id:'lab',label:'Laboratoriya'},{id:'instrumental',label:'Instrumental'},{id:'treatment',label:'Davolash rejasi'}];

  const addDrug = () => setDrugs([...drugs,{drugName:'',dose:'',frequency:'',route:'',duration:'',rationale:''}]);
  const removeDrug = (i) => setDrugs(drugs.filter((_,j)=>j!==i));
  const setDrug = (i,k,v) => { const d=[...drugs]; d[i]={...d[i],[k]:v}; setDrugs(d); };

  const submit = () => {
    const eval_ = evaluate(drugs, c.evaluationCriteria, monitoring);
    const sub = {
      caseId: c.id, studentId: user.id,
      answers: {drugs, monitoring, sideEffect, rationale},
      ...eval_,
      submittedAt: new Date().toISOString()
    };
    const saved = DB.push('submissions', sub);
    setResult({...sub, id: saved.id});
    setSubmitted(true);
    onNavigate('result_'+saved.id);
  };

  return (
    <div className="space-y-5">
      <div className="flex items-center gap-3">
        <button onClick={()=>onNavigate('cases')} className="text-slate-400 hover:text-slate-700 text-xl">←</button>
        <div>
          <h1 className="text-xl font-bold text-slate-900">{c.title}</h1>
          <div className="flex gap-2 mt-1"><Badge label={c.specialty} color="blue"/><Badge label={c.topic} color="purple"/></div>
        </div>
      </div>
      {/* tabs */}
      <div className="flex gap-1 bg-slate-100 p-1 rounded-xl overflow-x-auto">
        {tabs.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} className={`flex-shrink-0 px-4 py-2 rounded-lg text-xs font-semibold transition-all ${tab===t.id?'bg-white text-sky-600 shadow-sm':'text-slate-500 hover:text-slate-700'}`}>{t.label}</button>
        ))}
      </div>
      {/* tab content */}
      <Card className="p-6">
        {tab==='passport' && (
          <div className="grid sm:grid-cols-2 gap-4 text-sm">
            {[
              ['Yosh',p.age+' yosh'],['Jins',genderLabel[p.gender]||p.gender],
              ['Og\'irlik darajasi',<Badge label={severityLabel[p.severityLevel]||p.severityLevel} color={p.severityLevel==='severe'?'red':p.severityLevel==='moderate'?'yellow':'green'}/>],
              ['Jigar holati',organLabel[p.liverStatus]||p.liverStatus],
              ['Buyrak holati',organLabel[p.kidneyStatus]||p.kidneyStatus],
              ['Homilador',p.isPregnant?'Ha ✓':'Yo\'q'],
              ['Emizuvchi',p.isLactating?'Ha ✓':'Yo\'q'],
            ].map(([k,v],i)=>(
              <div key={i} className="bg-slate-50 rounded-xl p-3"><p className="text-xs text-slate-500 mb-1">{k}</p><p className="font-semibold text-slate-800">{v}</p></div>
            ))}
            {p.comorbidities && <div className="sm:col-span-2 bg-orange-50 rounded-xl p-3"><p className="text-xs text-orange-500 mb-1">Hamroh kasalliklar</p><p className="font-semibold text-slate-800 text-sm">{p.comorbidities}</p></div>}
            {p.allergyHistory && <div className="sm:col-span-2 bg-red-50 rounded-xl p-3"><p className="text-xs text-red-500 mb-1">Allergologik anamnez</p><p className="font-semibold text-slate-800 text-sm">{p.allergyHistory}</p></div>}
          </div>
        )}
        {tab==='complaints' && <div><p className="text-sm font-medium text-slate-500 mb-2">Asosiy shikoyatlari:</p><p className="text-slate-800 leading-relaxed bg-slate-50 rounded-xl p-4">{p.mainComplaint}</p></div>}
        {tab==='anamnesis' && (
          <div className="space-y-4">
            <div><p className="text-sm font-medium text-slate-500 mb-2">Kasallik tarixi (Anamnesis morbi):</p><p className="text-slate-800 leading-relaxed bg-slate-50 rounded-xl p-4">{p.anamnesis}</p></div>
            {p.currentMedications && <div><p className="text-sm font-medium text-slate-500 mb-2">Qabul qilayotgan dorilar:</p><p className="text-slate-800 bg-blue-50 rounded-xl p-4">{p.currentMedications}</p></div>}
          </div>
        )}
        {tab==='lab' && <div><p className="text-sm font-medium text-slate-500 mb-2">Laboratoriya tahlillari:</p><pre className="text-slate-800 bg-slate-50 rounded-xl p-4 whitespace-pre-wrap text-sm">{p.labResults||"Ko'rsatilmagan"}</pre></div>}
        {tab==='instrumental' && <div><p className="text-sm font-medium text-slate-500 mb-2">Instrumental tekshiruv natijalari:</p><pre className="text-slate-800 bg-slate-50 rounded-xl p-4 whitespace-pre-wrap text-sm">{p.instrumentalResults||"Ko'rsatilmagan"}</pre></div>}
        {tab==='treatment' && (
          <div className="space-y-6">
            <div className="flex items-center justify-between">
              <h3 className="font-bold text-slate-800">Dorilar ro'yxati</h3>
              <Btn size="sm" onClick={addDrug}>+ Dori qo'shish</Btn>
            </div>
            {drugs.map((drug,i)=>(
              <div key={i} className="bg-slate-50 rounded-xl p-4 border border-slate-200 space-y-3">
                <div className="flex items-center justify-between"><span className="font-semibold text-slate-700 text-sm">Dori #{i+1}</span>{drugs.length>1&&<button onClick={()=>removeDrug(i)} className="text-red-400 hover:text-red-600 text-sm">🗑 O'chirish</button>}</div>
                <div className="grid sm:grid-cols-2 gap-3">
                  <Input label="Dori nomi" value={drug.drugName} onChange={e=>setDrug(i,'drugName',e.target.value)} placeholder="Masalan: Amoksisiklin" />
                  <Input label="Doza" value={drug.dose} onChange={e=>setDrug(i,'dose',e.target.value)} placeholder="Masalan: 500 mg" />
                  <Input label="Qabul qilish chastotasi" value={drug.frequency} onChange={e=>setDrug(i,'frequency',e.target.value)} placeholder="Masalan: 3 marta/kun" />
                  <Select label="Qabul yo'li" value={drug.route} onChange={e=>setDrug(i,'route',e.target.value)} options={[{value:'',label:'Tanlang...'},{value:"Og'iz orqali",label:"Og'iz orqali"},{value:'Vena ichiga',label:'Vena ichiga'},{value:'Mushak ichiga',label:'Mushak ichiga'},{value:'Teri ostiga',label:'Teri ostiga'},{value:'Inhalatsiya',label:'Inhalatsiya'}]} />
                  <Input label="Davolash davomiyligi" value={drug.duration} onChange={e=>setDrug(i,'duration',e.target.value)} placeholder="Masalan: 7 kun" />
                  <Input label="Asoslash (ixtiyoriy)" value={drug.rationale} onChange={e=>setDrug(i,'rationale',e.target.value)} placeholder="Nima uchun bu dori?" />
                </div>
              </div>
            ))}
            <div className="space-y-3 pt-2">
              <Textarea label="Monitoring rejasi" value={monitoring} onChange={e=>setMonitoring(e.target.value)} rows={3} placeholder="Terapiyani kuzatish rejasi..." />
              <Textarea label="Yon ta'sirlarni oldini olish choralari" value={sideEffect} onChange={e=>setSideEffect(e.target.value)} rows={2} placeholder="Yon ta'sirlarni oldini olish..." />
              <Textarea label="Klinik asoslash" value={rationale} onChange={e=>setRationale(e.target.value)} rows={3} placeholder="Davolash strategiyangizni asoslang..." />
            </div>
            <Btn onClick={submit} size="lg" className="w-full" disabled={!drugs[0].drugName}>🎯 Javobni topshirish</Btn>
          </div>
        )}
      </Card>
    </div>
  );
}

      <h1 className="text-2xl font-bold text-slate-900">{user.role==='student'?'Natijalarim':'Barcha natijalar'}</h1>
      {list.length===0 && <div className="text-center py-16 text-slate-400"><p className="text-4xl mb-3">📭</p><p>Hali hech qanday topshiriq yo'q</p></div>}
      <div className="space-y-3">
        {[...list].reverse().map(s=>{
          const c = cases.find(x=>x.id===s.caseId);
          const u = users_.find(x=>x.id===s.studentId);
          return (
            <Card key={s.id} className="p-4 hover:shadow-md transition cursor-pointer" onClick={()=>onNavigate('result_'+s.id)}>
              <div className="flex items-center justify-between gap-4">
                <div className="flex-1 min-w-0">
                  <p className="font-semibold text-slate-800 text-sm truncate">{c?.title||"Noma'lum"}</p>
                  {user.role!=='student' && <p className="text-xs text-slate-500 mt-0.5">👤 {u?.name}</p>}
                  <p className="text-xs text-slate-400 mt-0.5">{new Date(s.submittedAt).toLocaleDateString('uz-UZ')}</p>
                </div>
                <div className="flex items-center gap-3 flex-shrink-0">
                  <div className="text-right">
                    <p className={`text-xl font-bold ${s.percentage>=80?'text-green-600':s.percentage>=50?'text-yellow-600':'text-red-600'}`}>{s.percentage}%</p>
                  </div>
                  <Badge label={s.percentage>=80?'A\'lo':s.percentage>=50?"Qoniqarli":'Yaxshilash kerak'} color={s.percentage>=80?'green':s.percentage>=50?'yellow':'red'}/>
                </div>
              </div>
            </Card>
          );
        })}
      </div>
    </div>
  );
}

/* -- CASE EDITOR -- */
function CaseEditor({caseId, onNavigate}) {
  const {user} = useAuth();
  const cases = DB.get('cases') || [];
  const existing = caseId ? cases.find(c=>c.id===Number(caseId)) : null;
  const [step, setStep] = useState(0);
  const [form, setForm] = useState(existing ? {
    title:existing.title, specialty:existing.specialty, topic:existing.topic, difficulty:existing.difficulty,
    ...existing.patientInfo, ...existing.evaluationCriteria
  } : {
    title:'', specialty:'', topic:'', difficulty:'medium',
    age:'', gender:'female', mainComplaint:'', anamnesis:'', comorbidities:'', isPregnant:false, isLactating:false,
    liverStatus:'normal', kidneyStatus:'normal', allergyHistory:'', currentMedications:'', labResults:'', instrumentalResults:'', severityLevel:'mild',
    correctDrug:'', correctDose:'', correctDuration:'', correctRoute:"Og'iz orqali", monitoringPlan:'', correctRationale:'',
    drugSelectionWeight:3, doseCorrectWeight:2, contraindicationsWeight:2, interactionsWeight:1, durationWeight:1, monitoringWeight:1, safetyWeight:2
  });
  const f = (k) => (v) => setForm(p=>({...p,[k]:typeof v==='object'&&v.target?v.target.value:v}));
  const save = () => {
    const patientInfo = {age:Number(form.age),gender:form.gender,mainComplaint:form.mainComplaint,anamnesis:form.anamnesis,comorbidities:form.comorbidities,isPregnant:form.isPregnant,isLactating:form.isLactating,liverStatus:form.liverStatus,kidneyStatus:form.kidneyStatus,allergyHistory:form.allergyHistory,currentMedications:form.currentMedications,labResults:form.labResults,instrumentalResults:form.instrumentalResults,severityLevel:form.severityLevel};
    const evaluationCriteria = {correctDrug:form.correctDrug,correctDose:form.correctDose,correctDuration:form.correctDuration,correctRoute:form.correctRoute,monitoringPlan:form.monitoringPlan,correctRationale:form.correctRationale,drugSelectionWeight:Number(form.drugSelectionWeight),doseCorrectWeight:Number(form.doseCorrectWeight),contraindicationsWeight:Number(form.contraindicationsWeight),interactionsWeight:Number(form.interactionsWeight),durationWeight:Number(form.durationWeight),monitoringWeight:Number(form.monitoringWeight),safetyWeight:Number(form.safetyWeight)};
    if (existing) {
      DB.update('cases', existing.id, {title:form.title,specialty:form.specialty,topic:form.topic,difficulty:form.difficulty,patientInfo,evaluationCriteria,updatedAt:new Date().toISOString()});
    } else {
      DB.push('cases', {title:form.title,specialty:form.specialty,topic:form.topic,difficulty:form.difficulty,patientInfo,evaluationCriteria,createdBy:user.id,createdAt:new Date().toISOString(),updatedAt:new Date().toISOString()});
    }
    onNavigate('cases');
  };
  const steps = ['Asosiy ma\'lumot','Bemor holati','Baholash mezonlari'];
  const organOpts = [{value:'normal',label:'Normal'},{value:'mild_impairment',label:'Yengil buzilish'},{value:'severe_impairment',label:"Og'ir buzilish"}];
  return (
    <div className="space-y-6">
      <div className="flex items-center gap-3">
        <button onClick={()=>onNavigate('cases')} className="text-slate-400 hover:text-slate-700 text-xl">←</button>
        <h1 className="text-2xl font-bold text-slate-900">{existing?'Keysni tahrirlash':'Yangi keys yaratish'}</h1>
      </div>
      <div className="flex gap-1 bg-slate-100 p-1 rounded-xl">
        {steps.map((s,i)=><button key={i} onClick={()=>setStep(i)} className={`flex-1 py-2 rounded-lg text-xs font-semibold transition-all ${step===i?'bg-white text-sky-600 shadow-sm':'text-slate-400'}`}>{i+1}. {s}</button>)}
      </div>
      <Card className="p-6 space-y-4">
        {step===0 && <>
          <Input label="Keys sarlavhasi" value={form.title} onChange={f('title')} placeholder="Tashxis nomi..." />
          <Input label="Mutaxassislik" value={form.specialty} onChange={f('specialty')} placeholder="Masalan: Kardiologiya" />
          <Input label="Mavzu" value={form.topic} onChange={f('topic')} placeholder="Masalan: Miokard infarkti" />
          <Select label="Qiyinligi" value={form.difficulty} onChange={f('difficulty')} options={[{value:'easy',label:'Oson'},{value:'medium',label:"O'rta"},{value:'hard',label:'Qiyin'}]}/>
        </>}
        {step===1 && <>
          <div className="grid sm:grid-cols-2 gap-4">
            <Input label="Yoshi" type="number" value={form.age} onChange={f('age')} placeholder="52"/>
            <Select label="Jinsi" value={form.gender} onChange={f('gender')} options={[{value:'female',label:'Ayol'},{value:'male',label:'Erkak'}]}/>
            <Select label="Jigar holati" value={form.liverStatus} onChange={f('liverStatus')} options={organOpts}/>
            <Select label="Buyrak holati" value={form.kidneyStatus} onChange={f('kidneyStatus')} options={organOpts}/>
            <Select label="Og'irlik darajasi" value={form.severityLevel} onChange={f('severityLevel')} options={[{value:'mild',label:'Yengil'},{value:'moderate',label:"O'rta og'ir"},{value:'severe',label:"Og'ir"}]}/>
          </div>
          <Textarea label="Asosiy shikoyatlari" value={form.mainComplaint} onChange={f('mainComplaint')} rows={3}/>
          <Textarea label="Anamnez" value={form.anamnesis} onChange={f('anamnesis')} rows={3}/>
          <Textarea label="Hamroh kasalliklar" value={form.comorbidities} onChange={f('comorbidities')} rows={2}/>
          <Textarea label="Allergologik anamnez" value={form.allergyHistory} onChange={f('allergyHistory')} rows={2}/>
          <Textarea label="Qabul qilayotgan dorilar" value={form.currentMedications} onChange={f('currentMedications')} rows={2}/>
          <Textarea label="Laboratoriya tahlillari" value={form.labResults} onChange={f('labResults')} rows={3}/>
          <Textarea label="Instrumental tekshiruvlar" value={form.instrumentalResults} onChange={f('instrumentalResults')} rows={3}/>
          <div className="flex gap-4">
            <label className="flex items-center gap-2 cursor-pointer"><input type="checkbox" checked={form.isPregnant} onChange={e=>setForm(p=>({...p,isPregnant:e.target.checked}))} className="rounded"/><span className="text-sm">Homilador</span></label>
            <label className="flex items-center gap-2 cursor-pointer"><input type="checkbox" checked={form.isLactating} onChange={e=>setForm(p=>({...p,isLactating:e.target.checked}))} className="rounded"/><span className="text-sm">Emizuvchi</span></label>
          </div>
        </>}
        {step===2 && <>
          <div className="grid sm:grid-cols-2 gap-4">
            <Input label="To'g'ri dori" value={form.correctDrug} onChange={f('correctDrug')} placeholder="Masalan: Amoksisiklin"/>
            <Input label="To'g'ri doza" value={form.correctDose} onChange={f('correctDose')} placeholder="Masalan: 500 mg"/>
            <Input label="Davomiylik" value={form.correctDuration} onChange={f('correctDuration')} placeholder="Masalan: 7 kun"/>
            <Input label="Qabul yo'li" value={form.correctRoute} onChange={f('correctRoute')} placeholder="Og'iz orqali"/>
          </div>
          <Textarea label="Monitoring rejasi" value={form.monitoringPlan} onChange={f('monitoringPlan')} rows={3}/>
          <Textarea label="To'g'ri yondashuv asosi" value={form.correctRationale} onChange={f('correctRationale')} rows={3}/>
          <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
            {[['Dori tanlov','drugSelectionWeight'],['Doza','doseCorrectWeight'],['Kontaindikatsiya','contraindicationsWeight'],['Interaksiya','interactionsWeight'],['Davomiylik','durationWeight'],['Monitoring','monitoringWeight'],['Xavfsizlik','safetyWeight']].map(([lbl,k])=>(
              <Input key={k} label={lbl+' (og\'irlik)'} type="number" min="0" max="5" value={form[k]} onChange={e=>setForm(p=>({...p,[k]:e.target.value}))}/>
            ))}
          </div>
        </>}
        <div className="flex justify-between pt-2">
          {step>0?<Btn onClick={()=>setStep(s=>s-1)} variant="secondary">← Oldingi</Btn>:<div/>}
          {step<2?<Btn onClick={()=>setStep(s=>s+1)}>Keyingi →</Btn>:<Btn onClick={save}>💾 Saqlash</Btn>}
        </div>
      </Card>
    </div>
  );
}

/* -- ANALYTICS -- */
function Analytics() {
  const subs = DB.get('submissions') || [];
  const cases = DB.get('cases') || [];
  const users = DB.get('users') || [];
  const students = users.filter(u=>u.role==='student');
  const avg = subs.length ? Math.round(subs.reduce((a,b)=>a+b.percentage,0)/subs.length) : 0;
  const dist = [
    {label:'0-49%',count:subs.filter(s=>s.percentage<50).length,color:'bg-red-400'},
    {label:'50-69%',count:subs.filter(s=>s.percentage>=50&&s.percentage<70).length,color:'bg-yellow-400'},
    {label:'70-84%',count:subs.filter(s=>s.percentage>=70&&s.percentage<85).length,color:'bg-blue-400'},
    {label:'85-100%',count:subs.filter(s=>s.percentage>=85).length,color:'bg-green-400'},
  ];
  const maxCount = Math.max(...dist.map(d=>d.count),1);
  const mistakeCounts = {};
  subs.forEach(s=>(s.mistakeAreas||[]).forEach(m=>{mistakeCounts[m]=(mistakeCounts[m]||0)+1;}));
  const topMistakes = Object.entries(mistakeCounts).sort((a,b)=>b[1]-a[1]).slice(0,5);
  return (
    <div className="space-y-6">
      <h1 className="text-2xl font-bold text-slate-900">Tahlil va hisobotlar 📊</h1>
      <div className="grid grid-cols-2 sm:grid-cols-4 gap-4">
        {[{l:'Talabalar',v:students.length,icon:'👨‍🎓'},{l:'Keyslar',v:cases.length,icon:'📋'},{l:'Topshiriqlar',v:subs.length,icon:'📝'},{l:"O'rt. ball",v:avg+'%',icon:'🏆'}].map((s,i)=>(
          <Card key={i} className="p-5 text-center"><p className="text-3xl mb-1">{s.icon}</p><p className="text-xs text-slate-500">{s.l}</p><p className="text-2xl font-bold text-slate-800">{s.v}</p></Card>
        ))}
      </div>
      <div className="grid sm:grid-cols-2 gap-6">
        <Card className="p-6">
          <h3 className="font-bold text-slate-800 mb-4">Ball taqsimoti</h3>
          <div className="space-y-3">
            {dist.map((d,i)=>(
              <div key={i}>
                <div className="flex justify-between text-sm mb-1"><span className="text-slate-600">{d.label}</span><span className="font-semibold">{d.count}</span></div>
                <div className="h-6 bg-slate-100 rounded-full overflow-hidden">
                  <div className={`h-full ${d.color} rounded-full transition-all`} style={{width:`${(d.count/maxCount)*100}%`}}/>
                </div>
              </div>
            ))}
          </div>
        </Card>
        <Card className="p-6">
          <h3 className="font-bold text-slate-800 mb-4">Ko'p uchraydigan xatolar</h3>
          {topMistakes.length===0 && <p className="text-slate-400 text-sm text-center py-8">Hali ma'lumot yo'q</p>}
          <div className="space-y-2">
            {topMistakes.map(([m,cnt],i)=>(
              <div key={i} className="flex items-center gap-3 p-3 bg-red-50 rounded-xl">
                <span className="w-6 h-6 rounded-full bg-red-500 text-white flex items-center justify-center text-xs font-bold flex-shrink-0">{i+1}</span>
                <span className="text-sm text-slate-700 flex-1">{m}</span>
                <Badge label={cnt+' marta'} color="red"/>
              </div>
            ))}
          </div>
        </Card>
      </div>
      <Card className="p-6">
        <h3 className="font-bold text-slate-800 mb-4">So'nggi topshiriqlar</h3>
        <div className="overflow-x-auto">
          <table className="w-full text-sm">
            <thead><tr className="border-b text-left text-slate-500"><th className="pb-3 pr-4">Talaba</th><th className="pb-3 pr-4">Keys</th><th className="pb-3 pr-4">Ball</th><th className="pb-3">Sana</th></tr></thead>
            <tbody className="divide-y">
              {[...subs].reverse().slice(0,10).map(s=>{
                const c=cases.find(x=>x.id===s.caseId);
                const u=users.find(x=>x.id===s.studentId);
                return <tr key={s.id} className="hover:bg-slate-50"><td className="py-3 pr-4 font-medium">{u?.name}</td><td className="py-3 pr-4 text-slate-500 max-w-[200px] truncate">{c?.title}</td><td className="py-3 pr-4"><Badge label={s.percentage+'%'} color={s.percentage>=80?'green':s.percentage>=50?'yellow':'red'}/></td><td className="py-3 text-slate-400">{new Date(s.submittedAt).toLocaleDateString('uz-UZ')}</td></tr>;
              })}
              {!subs.length && <tr><td colSpan={4} className="py-8 text-center text-slate-400">Topshiriqlar yo'q</td></tr>}
            </tbody>
          </table>
        </div>
      </Card>
    </div>
  );
}

/* -- ADMIN USERS -- */
function AdminUsers() {
  const [users_, setUsers] = useState(DB.get('users')||[]);
  const roleLabel = {admin:'Admin', teacher:"O'qituvchi", student:'Talaba'};
  const roleColor = {admin:'purple', teacher:'blue', student:'green'};
  const changeRole = (id, role) => {
    DB.update('users', id, {role});
    setUsers(DB.get('users')||[]);
  };
  return (
    <div className="space-y-6">
      <h1 className="text-2xl font-bold text-slate-900">Foydalanuvchilarni boshqarish 👥</h1>
      <Card className="p-6">
        <div className="overflow-x-auto">
          <table className="w-full text-sm">
            <thead><tr className="border-b text-left text-slate-500"><th className="pb-3 pr-4">Ism</th><th className="pb-3 pr-4">Email</th><th className="pb-3 pr-4">Rol</th><th className="pb-3">Rolni o'zgartirish</th></tr></thead>
            <tbody className="divide-y">
              {users_.map(u=>(
                <tr key={u.id} className="hover:bg-slate-50">
                  <td className="py-3 pr-4 font-medium text-slate-800">{u.name}</td>
                  <td className="py-3 pr-4 text-slate-500">{u.email}</td>
                  <td className="py-3 pr-4"><Badge label={roleLabel[u.role]} color={roleColor[u.role]}/></td>
                  <td className="py-3">
                    <div className="flex gap-2 flex-wrap">
                      {['student','teacher','admin'].filter(r=>r!==u.role).map(r=>(
                        <Btn key={r} size="sm" variant="secondary" onClick={()=>changeRole(u.id,r)}>{roleLabel[r]}</Btn>
                      ))}
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </Card>
    </div>
  );
}

/* ===== MAIN APP ===== */
function App() {
  const [user, setUser] = useState(() => DB.get('currentUser'));
  const [page, setPage] = useState('dashboard');

  useEffect(() => { seedData(); }, []);

  const login = (email, password) => {
    const users = DB.get('users') || [];
    const u = users.find(x=>x.email===email && x.password===password);
    if (u) { setUser(u); DB.set('currentUser', u); return true; }
    return false;
  };
  const register = (data) => {
    const users = DB.get('users') || [];
    if (users.find(u=>u.email===data.email)) return false;
    const newUser = {...data, id: Date.now(), createdAt: new Date().toISOString()};
    users.push(newUser);
    DB.set('users', users);
    setUser(newUser); DB.set('currentUser', newUser);
    return true;
  };
  const logout = () => { setUser(null); DB.set('currentUser', null); setPage('dashboard'); };
  const navigate = (p) => { setPage(p); window.scrollTo(0,0); };

  if (!user) {
    if (page==='register') return <AuthCtx.Provider value={{login,register,logout}}><RegisterPage onNavigate={navigate}/></AuthCtx.Provider>;
    return <AuthCtx.Provider value={{login,register,logout}}><LoginPage onNavigate={navigate}/></AuthCtx.Provider>;
  }

  let content;
  if (page==='dashboard') content = <Dashboard onNavigate={navigate}/>;
  else if (page==='cases') content = <CasesList onNavigate={navigate}/>;
  else if (page.startsWith('case_')) content = <SolveCase caseId={page.split('_')[1]} onNavigate={navigate}/>;
  else if (page.startsWith('result_')) content = <ResultPage submissionId={page.split('_')[1]} onNavigate={navigate}/>;
  else if (page==='results') content = <ResultsList onNavigate={navigate}/>;
  else if (page==='newcase') content = <CaseEditor onNavigate={navigate}/>;
  else if (page.startsWith('editcase_')) content = <CaseEditor caseId={page.split('_')[1]} onNavigate={navigate}/>;
  else if (page==='analytics') content = <Analytics/>;
  else if (page==='users') content = <AdminUsers/>;
  else content = <Dashboard onNavigate={navigate}/>;

  return (
    <AuthCtx.Provider value={{user, login, register, logout}}>
      <Layout page={page} onNavigate={navigate}>{content}</Layout>
    </AuthCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
